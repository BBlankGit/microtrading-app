version: "3.9"

services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    # Phase G1A: allow the backend container to reach the host's loopback
    # Ollama (127.0.0.1:11434) via host.docker.internal. The host's Ollama
    # stays bound to localhost — Docker reaches it through the bridge
    # gateway, NOT a public port.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../../frontend/dashboard:/app
      - frontend_next:/app/.next          # named volume: host .next cannot pollute container
      - frontend_modules:/app/node_modules  # named volume: linux-native node_modules
    ports:
      - "3000:3000"
    command: >
      sh -c "
        find /app/.next -mindepth 1 -delete 2>/dev/null || true &&
        npm ci --include=dev &&
        npm run build &&
        npx next start -H 0.0.0.0 -p 3000
      "
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
    restart: unless-stopped
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: microtrader
      POSTGRES_PASSWORD: microtrader_password
      POSTGRES_DB: microtrading
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  frontend_next:
  frontend_modules:
